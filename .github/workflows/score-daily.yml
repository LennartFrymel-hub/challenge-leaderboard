name: Daily Scoring

on:
  schedule:
    - cron: "0 7 * * *"     # täglich 07:00 UTC (08:00/09:00 CEST/CET)
  workflow_dispatch:
    inputs:
      target_date:
        description: "Manueller Score-Lauf für YYYY-MM-DD (leer = gestern UTC)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  score:
    runs-on: ubuntu-latest
    env:
      ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Python-Stack
        run: uv sync --frozen

      - name: Zieltag bestimmen
        id: target
        run: |
          if [[ -n "${{ inputs.target_date }}" ]]; then
            DATE="${{ inputs.target_date }}"
          else
            DATE=$(date -u -d "yesterday" +"%Y-%m-%d")
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "[score-daily] Zieltag: $DATE"

      - name: Scoring ausführen
        run: uv run python scripts/score_day.py --date "${{ steps.target.outputs.date }}"

      - name: Score-Stand committen
        run: |
          if [[ -n $(git status --porcelain data/scores.parquet) ]]; then
            git config user.name  "challenge-bot"
            git config user.email "challenge-bot@users.noreply.github.com"
            git add data/scores.parquet
            git commit -m "score: Tageslauf ${{ steps.target.outputs.date }}"
            git push
          else
            echo "[score-daily] Keine neuen Scores für ${{ steps.target.outputs.date }}."
          fi
